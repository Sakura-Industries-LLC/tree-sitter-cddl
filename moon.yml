tasks:
  fix:
    deps:
      - "root:markdown-fix"
    options:
      runInCI: false

  ci:
    deps:
      - "root:markdown-check"
      - "root:spell-check"
      - "root:grammar-generate"
      - "root:grammar-build"
      - "root:grammar-test"
      - "root:binding-test-rust"
      - "root:binding-test-node"
      - "root:binding-test-go"
      - "root:binding-test-python"
      # - "root:binding-test-swift"
      # - "root:binding-test-zig"
      # - "root:binding-test-java"
    options:
      runInCI: true

  markdown-check:
    command: "rumdl"
    args:
      - "check"
      - "."
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "**/*.md"
      - "**/*.mdx"
      - "**/*.markdown"
      - "!**/node_modules/**"

  spell-check:
    command: "cspell"
    args:
      - "lint"
      - "--config"
      - "cspell.json"
      - "--no-progress"
      - "."
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "**/*.c"
      - "**/*.h"
      - "**/*.js"
      - "**/*.json"
      - "**/*.md"
      - "**/*.markdown"
      - "**/*.scm"
      - "**/*.toml"
      - "**/*.yaml"
      - "**/*.yml"
      - "!**/node_modules/**"
      - "!**/target/**"
      - "!**/build/**"
      - "cspell.json"
      - ".config/dictionaries/project.dic"

  markdown-fix:
    command: "rumdl"
    args:
      - "check"
      - "--fix"
      - "."
    options:
      runInCI: false
    inputs:
      - "**/*.md"
      - "**/*.mdx"
      - "**/*.markdown"
      - "!**/node_modules/**"

  grammar-generate:
    command: "tree-sitter"
    args:
      - "generate"
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "grammar.js"
      - "tree-sitter.json"
      - "src/**"
      - "!src/parser.c"
      - "!src/tree_sitter/**"

  grammar-build:
    deps:
      - "grammar-generate"
    command: "tree-sitter"
    args:
      - "build"
      - "--wasm"
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "grammar.js"
      - "src/parser.c"
      - "src/tree_sitter/**"

  grammar-build-native:
    deps:
      - "grammar-generate"
    command: "tree-sitter"
    args:
      - "build"
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "grammar.js"
      - "src/parser.c"
      - "src/tree_sitter/**"

  grammar-test:
    deps:
      - "grammar-build-native"
    command: "tree-sitter"
    args:
      - "test"
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "grammar.js"
      - "src/**"
      - "corpus/**"
      - "test/**"

  binding-test-rust:
    deps:
      - "grammar-generate"
    command: "cargo"
    args:
      - "test"
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "src/**"
      - "bindings/rust/**"
      - "Cargo.toml"
      - "Cargo.lock"

  binding-test-node:
    deps:
      - "grammar-generate"
    command: "bash"
    args:
      - "-c"
      - "npm install && CXXFLAGS='-std=c++20' npm rebuild && npm test"
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "src/**"
      - "bindings/node/**"
      - "binding.gyp"
      - "package.json"
      - "package-lock.json"

  binding-test-go:
    deps:
      - "grammar-generate"
    command: "bash"
    args:
      - "-c"
      - "go mod tidy && go test ./bindings/go/"
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "src/**"
      - "bindings/go/**"
      - "go.mod"
      - "go.sum"

  binding-test-python:
    deps:
      - "grammar-generate"
    command: "bash"
    args:
      - '-c'
      - 'pip install ".[core]" pytest && python -m pytest bindings/python/tests/'
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "src/**"
      - "bindings/python/**"
      - "setup.py"
      - "pyproject.toml"

  binding-test-swift:
    deps:
      - "grammar-generate"
    command: "swift"
    args:
      - "test"
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "src/**"
      - "bindings/swift/**"
      - "Package.swift"

  binding-test-zig:
    deps:
      - "grammar-generate"
    command: "zig"
    args:
      - "build"
      - "test"
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "src/**"
      - "bindings/zig/**"
      - "build.zig"
      - "build.zig.zon"

  binding-test-java:
    deps:
      - "grammar-generate"
    command: "mvn"
    args:
      - "test"
    options:
      runInCI: true
      outputStyle: "stream"
    inputs:
      - "src/**"
      - "bindings/java/**"
      - "pom.xml"

  docker-cache-dir:
    command: "mkdir"
    args:
      - "-p"
      - ".moon/docker-cache"
    options:
      runInCI: false
